name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

        uses: actions/checkout@v4
    steps:
      - name: Checkout

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '14.3'  # 或者你本地 Xcode 版本

      - name: Build IPA
        run: |
          mkdir FloatingTimerApp
          cd FloatingTimerApp
          cat > project.yml << 'EOF'
          name: FloatingTimer
          options:
            bundleIdPrefix: com.floating
          targets:
            FloatingTimer:
              type: application
              platform: iOS
              sources:
                - ../FloatingView.swift
                - ../ViewController.swift
                - ../AppDelegate.swift
                - ../SceneDelegate.swift
          EOF
          xcodegen generate
          xcodebuild -scheme FloatingTimer -sdk iphoneos -configuration Release archive -archivePath FloatingTimer.xcarchive
          xcodebuild -exportArchive -archivePath FloatingTimer.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath ./build
